name: 🚀 Ansible Feature Request
description: Suggest an enhancement for Dell Ansible Collections
title: "[FEATURE]: "
labels: ["type/feature-request", "needs-triage", "ansible"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature enhancement for Dell Ansible Collections!
        
        ## Community Note
        * Please vote on this issue by adding a 👍 [reaction](https://blog.github.com/2016-03-10-add-reactions-to-pull-requests-issues-and-comments/) to help prioritize this request
        * Please do not leave "+1" or other comments that do not add relevant new information or questions
        * If you are interested in working on this issue or have submitted a pull request, please leave a comment

  - type: dropdown
    id: ansible-collection
    attributes:
      label: Ansible Collection
      description: Select the Dell Ansible Collection
      options:
        - dellemc.openmanage
        - dellemc.powerscale
        - dellemc.powermax
        - dellemc.powerstore
        - dellemc.powerflex
        - dellemc.unity
        - New Collection (specify in description)
        - Multiple Collections (specify in description)
    validations:
      required: true

  - type: input
    id: module-name
    attributes:
      label: Module Name (if applicable)
      description: Enter the specific module name this relates to (e.g., dellemc_idrac_user_info)
      placeholder: "dellemc_idrac_user_info"
    validations:
      required: false

  - type: dropdown
    id: request-type
    attributes:
      label: Request Type
      description: What type of enhancement are you requesting?
      options:
        - New Module
        - New Module Parameter
        - Module Enhancement
        - Documentation Improvement
        - Performance Improvement
        - Error Handling Improvement
        - Integration Enhancement
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve with this feature request?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen
    validations:
      required: true

  - type: textarea
    id: ansible-use-case
    attributes:
      label: Ansible Use Case
      description: |
        Describe how this feature would be used in Ansible automation.
        Include example playbook or task if possible.
        
        Example:
        ```yaml
        - name: Proposed new functionality
          dellemc.openmanage.new_module:
            parameter1: value1
            parameter2: value2
        ```
      render: markdown
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions Considered
      description: A clear and concise description of any alternative solutions or workarounds you've considered
    validations:
      required: false

  - type: textarea
    id: api-considerations
    attributes:
      label: API/Backend Considerations
      description: |
        If this feature involves API calls, describe:
        - Relevant API endpoints (if known)
        - API version requirements
        - Authentication considerations
        - Rate limiting or performance concerns
    validations:
      required: false

  - type: dropdown
    id: contribution-interest
    attributes:
      label: Contribution Interest
      description: Would you be interested in contributing to this feature?
      options:
        - Yes, I can implement this feature
        - Yes, I can help with testing
        - Yes, I can help with documentation
        - No, but I can provide guidance
        - No contribution interest at this time
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples about the feature request
    validations:
      required: false
