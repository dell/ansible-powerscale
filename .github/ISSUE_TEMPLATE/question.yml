name: 💬 PowerScale Ansible Question
description: Ask usage questions about Dell PowerScale Ansible Modules
title: "[QUESTION]: "
labels: ["type/question", "needs-triage", "ansible"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      description: "[QUESTION]: prefix is required and cannot be removed"
      value: "[QUESTION]: "
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Thank you for asking a question about Dell PowerScale Ansible Modules! Please provide the information below.
        
        ## Community Note
        * Please vote on this question by adding a 👍 [reaction](https://blog.github.com/2016-03-10-add-reactions-to-pull-requests-issues-and-comments/) to help prioritize this request
        * Please do not leave "+1" or other comments that do not add relevant new information or questions
        * If you are interested in working on this issue or have submitted a pull request, please leave a comment

  - type: input
    id: module-name
    attributes:
      label: Module Name
      description: Specify the relevant PowerScale module name
      placeholder: "e.g., powerscale_filesystem, powerscale_nfs, powerscale_user"
    validations:
      required: false

  - type: dropdown
    id: question-category
    attributes:
      label: Question Category
      description: What type of question do you have?
      options:
        - Module Usage
        - Installation/Setup
        - Authentication
        - Error Troubleshooting
        - Best Practices
        - Integration
        - Documentation
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: controller-environment
    attributes:
      label: Ansible Controller Environment
      description: If using Ansible Tower/AWX, provide controller details
      placeholder: |
        Controller Version: e.g., Tower 3.8, AWX 19.0
        Execution Environment: e.g., Custom EE, Default EE
    validations:
      required: false

  - type: textarea
    id: control-node-environment
    attributes:
      label: Control Node Environment
      description: If running from command line, provide control node details
      placeholder: |
        Operating System: e.g., RHEL 8.5, Ubuntu 20.04, macOS
        Python Version: e.g., Python 3.9, Python 3.10
        Ansible Version: e.g., Ansible 2.12.5, Ansible 2.13.0
        Collection Version: e.g., dellemc.openmanage 6.0.0
    validations:
      required: false

  - type: textarea
    id: target-environment
    attributes:
      label: Target Environment
      description: Dell hardware/software you're managing
      placeholder: |
        Dell Product: e.g., iDRAC, OME, PowerScale, PowerMax
        Product Version: e.g., iDRAC 5.10.00.00, PowerScale 9.2.0.0
        Network Setup: e.g., Direct, VPN, Proxy
        Authentication Method: e.g., Username/Password, API Key, Certificate
    validations:
      required: false

  - type: textarea
    id: question-details
    attributes:
      label: Question Details
      description: Provide detailed information about your question
    validations:
      required: true

  - type: textarea
    id: troubleshooting
    attributes:
      label: What have you tried so far?
      description: Describe any troubleshooting steps you've already tried
    validations:
      required: false

  - type: textarea
    id: playbook-example
    attributes:
      label: Playbook/Task Example
      description: If relevant, include your playbook or task (remove sensitive data)
      placeholder: |
        ```yaml
        ---
        - hosts: localhost
          collections:
            - dell.powerscale
          tasks:
            - name: Your PowerScale task here
              dell.powerscale.powerscale_module:
                name: "example_resource"
                access_zone: "System"
                api_host: "{{ powerscale_host }}"
                api_user: "{{ powerscale_user }}"
                api_password: "{{ powerscale_password }}"
                validate_certs: false
        ```
    validations:
      required: false

  - type: textarea
    id: command-used
    attributes:
      label: Command Used
      description: If relevant, include the command you ran
      placeholder: |
        ```bash
        ansible-playbook -i inventory site.yml -vvv
        ```
    validations:
      required: false

  - type: textarea
    id: error-messages
    attributes:
      label: Error Messages
      description: Include any error messages you're encountering
      placeholder: |
        ```
        # Paste error messages here
        ```
    validations:
      required: false
